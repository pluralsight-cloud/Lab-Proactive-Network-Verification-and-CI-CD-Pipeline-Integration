---
testbed:
  name: CarvedRock-Cloud-Testbed
  credentials:
    default:
      username: admin
      password: CarvedRock2024!

devices:
  vpc-router-prod:
    os: linux
    type: router
    alias: production-vpc
    connections:
      defaults:
        class: unicon.Unicon
      cli:
        protocol: ssh
        ip: 10.1.0.1
        port: 22
    custom:
      vpc_id: vpc-prod-0a1b2c3d
      region: us-east-1
      availability_zones:
        - us-east-1a
        - us-east-1b

  vpc-router-staging:
    os: linux
    type: router
    alias: staging-vpc
    connections:
      defaults:
        class: unicon.Unicon
      cli:
        protocol: ssh
        ip: 10.2.0.1
        port: 22
    custom:
      vpc_id: vpc-staging-4e5f6g7h
      region: us-east-1
      availability_zones:
        - us-east-1a
        - us-east-1c

  vpc-router-dev:
    os: linux
    type: router
    alias: dev-vpc
    connections:
      defaults:
        class: unicon.Unicon
      cli:
        protocol: ssh
        ip: 10.3.0.1
        port: 22
    custom:
      vpc_id: vpc-dev-8i9j0k1l
      region: us-east-1
      availability_zones:
        - us-east-1a

topology:
  links:
    prod-to-staging:
      type: peering
      interfaces:
        vpc-router-prod:
          interface: peering0
        vpc-router-staging:
          interface: peering0
    prod-to-dev:
      type: peering
      interfaces:
        vpc-router-prod:
          interface: peering1
        vpc-router-dev:
          interface: peering0
